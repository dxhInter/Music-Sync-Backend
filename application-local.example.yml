server:
  port: 8080

spring:
  application:
    name: spotify-netease-sync
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/music_sync?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: your-db-password
  redis:
    host: localhost
    database: 0
    port: 6379
    password:
    timeout: 3000ms

jwt:
  secret: replace-with-your-jwt-secret
  expiration: 604800

music-sync:
  scheduler:
    enabled: false
  spotify:
    enabled: true
    client-id: your-spotify-client-id
    client-secret: your-spotify-client-secret
    redirect-uri: http://127.0.0.1:8080/sync/spotify/callback
    scope: user-library-read
    poll-interval-ms: 30000
    initial-sync-mode: LATEST_ONLY
    account-key: default
  netease:
    enabled: true
    base-url: http://127.0.0.1:3000
    cookie: MUSIC_U=...; __csrf=...
    search-limit: 10
    min-score: 0.75
