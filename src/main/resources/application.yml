server:
  port: 8080

spring:
  application:
    name: spotify-netease-sync
  profiles:
    active: dev
  config:
    import: optional:file:./application-local.yml,optional:file:./config/application-local.yml
#  main:
#    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    auto-mapping-behavior: partial
    map-underscore-to-camel-case: true

jwt:
  tokenHeader: Authorization #JWT存储的请求头
  secret: ${JWT_SECRET:change-me-in-local-env} #JWT加解密使用的密钥
  expiration: ${JWT_EXPIRATION:604800} #JWT的超期限时间(60*60*24*7)
  tokenHead: 'Bearer '  #JWT负载中拿到开头

redis:
  database: mall-tiny
  key:
    admin: 'admin'
    resourceList: 'resourceList'
  expire:
    common: 86400 # 24小时

secure:
  ignored:
    urls: #安全路径白名单
      - /swagger-ui/
      - /swagger-resources/**
      - /**/v2/api-docs
      - /**/*.html
      - /**/*.js
      - /**/*.css
      - /**/*.png
      - /favicon.ico
      - /actuator/**
      - /druid/**
      - /admin/login
      - /admin/register
      - /member/login
      - /member/register
      - /sync/spotify/callback
      - /sync/spotify/gallery

music-sync:
  scheduler:
    enabled: false
  spotify:
    enabled: true
    client-id: ${SPOTIFY_CLIENT_ID:}
    client-secret: ${SPOTIFY_CLIENT_SECRET:}
    redirect-uri: ${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/sync/spotify/callback}
    scope: ${SPOTIFY_SCOPE:user-library-read}
    poll-interval-ms: ${SPOTIFY_POLL_INTERVAL_MS:30000}
    initial-sync-mode: ${SPOTIFY_INITIAL_SYNC_MODE:LATEST_ONLY}
    account-key: ${SPOTIFY_ACCOUNT_KEY:default}
  netease:
    enabled: ${NETEASE_ENABLED:true}
    base-url: ${NETEASE_BASE_URL:http://127.0.0.1:3000}
    cookie: ${NETEASE_COOKIE:}
    search-limit: ${NETEASE_SEARCH_LIMIT:10}
    min-score: ${NETEASE_MIN_SCORE:0.75}
